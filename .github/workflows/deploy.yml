name: build-and-deploy

# 日次パイプライン:
#   HuggingFace(Parquet) から生データを取得 → SQLite再構築
#   → 気象庁から「前回以降の差分」だけ取得 → HFへ書き戻し
#   → 派生JSON生成 → Vite ビルド → GitHub Pages へデプロイ
#
# 生データの正準は HF Datasets（リポジトリにはデータを置かない）。
# 出典：気象庁ホームページ（公共データ利用規約 第1.0版）

on:
  push:
    branches: [main]
  schedule:
    # 1日2回。どちらの実行でも同じ手順を流す:
    #   build_daily.py    … obsdl（アーカイブ）から前日までの確定値
    #   fetch_realtime.py … 実況CSVから当日の速報値
    # 18時は当日の最高気温がほぼ出揃った状態、6時は前日ぶんが確定値へ差し替わる。
    - cron: '0 9 * * *'    # 18:00 JST … 当日の最高気温を速報として反映
    - cron: '0 21 * * *'   # 06:00 JST … 前日ぶんを確定値へ更新
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1本に絞る（cronとpushが重なっても安全）
concurrency:
  group: pages
  cancel-in-progress: false

env:
  HF_DATASET_REPO: furusu/japan-max-temperature

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: 生データ取得（HF → SQLite）
        working-directory: ingest
        run: |
          uv run python hf_store.py pull
          uv run python hf_store.py import

      # 地点マスタの再クロールは61都道府県ぶんのPOSTで約50秒かかる一方、
      # 内容は滅多に変わらない。通常は HF から復元した stations.json を使い、
      # 週1回（月曜）と手動実行のときだけ気象庁から取り直す。
      - name: 地点マスタ更新（週1回）
        if: github.event.schedule == '0 21 * * *' && github.event_name == 'schedule'
        working-directory: ingest
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            uv run python build_data.py --with-stations
          else
            echo "地点マスタはHF復元版を使用（月曜のみ再クロール）"
          fi

      - name: 気象庁から差分取込
        working-directory: ingest
        run: |
          uv run python build_data.py       # 歴代全国ランキング（1リクエスト）
          uv run python build_daily.py      # 確定値（前日まで）をまとめ取得
          uv run python fetch_realtime.py   # 当日の速報値（実況CSV・1リクエスト）

      - name: 生データをHFへ書き戻し
        working-directory: ingest
        run: |
          uv run python hf_store.py export
          uv run python hf_store.py push

      - name: 派生JSON生成
        working-directory: ingest
        run: |
          uv run python build_views.py   # トップ用の軽量JSON（最新日/地点ページ）
          # 日付ごとのJSON生成は廃止。日付ページ・ランキングはブラウザ内DuckDBが
          # Parquetへ直接SQLを投げる（4,993ファイル/59MB の生成が不要になった）

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        working-directory: web
        run: npm ci
      - name: build（prebuild が data/ を public/ にコピー）
        working-directory: web
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
