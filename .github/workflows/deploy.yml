name: build-and-deploy

# 日次パイプライン:
#   HuggingFace(Parquet) から生データを取得 → SQLite再構築
#   → 気象庁から「前回以降の差分」だけ取得 → HFへ書き戻し
#   → 派生JSON生成 → Vite ビルド → GitHub Pages へデプロイ
#
# 生データの正準は HF Datasets（リポジトリにはデータを置かない）。
# 出典：気象庁ホームページ（公共データ利用規約 第1.0版）

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 21 * * *'   # 毎日 06:00 JST（21:00 UTC）
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1本に絞る（cronとpushが重なっても安全）
concurrency:
  group: pages
  cancel-in-progress: false

env:
  HF_DATASET_REPO: furusu/japan-max-temperature

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: 生データ取得（HF → SQLite）
        working-directory: ingest
        run: |
          uv run python hf_store.py pull
          uv run python hf_store.py import

      - name: 気象庁から差分取込
        working-directory: ingest
        run: |
          uv run python build_data.py --with-stations   # 歴代ランキング＋地点マスタ
          uv run python build_daily.py                   # 前回以降の日別値だけ

      - name: 生データをHFへ書き戻し
        working-directory: ingest
        run: |
          uv run python hf_store.py export
          uv run python hf_store.py push

      - name: 派生JSON生成
        working-directory: ingest
        run: |
          uv run python build_views.py   # 最新日/地点/猛暑日回数
          uv run python build_dates.py   # 日付ごと＋暑い日索引

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        working-directory: web
        run: npm ci
      - name: build（prebuild が data/ を public/ にコピー）
        working-directory: web
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
