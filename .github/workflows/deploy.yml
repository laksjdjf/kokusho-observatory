name: build-and-deploy

# 気象庁から最高気温データを取り込み → JSON生成 → Vite ビルド → GitHub Pages へデプロイ。
# 日次 cron ＋ main への push ＋ 手動実行。

on:
  push:
    branches: [main]
  workflow_dispatch:
  # TODO: 日次cronは「差分取込 + HuggingFace永続化」を実装してから有効化する。
  # 現状の build_daily.py は毎回全期間を取り直す（165地点 × 全履歴 ≒ 40分、
  # 気象庁へ約200リクエスト）ため、毎日走らせるのは不適切。
  # schedule:
  #   - cron: '0 21 * * *'   # 毎日 06:00 JST（21:00 UTC）

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1本に絞る（cron と push が重なっても安全）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Python 取込（uv）----
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: 気象庁データ取込 → data/ 生成（歴代→日別→ビュー→日付）
        working-directory: ingest
        run: |
          uv run python build_data.py --with-stations   # 歴代ランキング＋官署マスタ
          uv run python build_daily.py                   # 官署の日別最高気温 → SQLite
          uv run python build_views.py                   # 昨日/地点/猛暑日回数 JSON
          uv run python build_dates.py                   # 日付ごと JSON ＋ 暑い日索引

      # ---- フロントビルド（Vite）----
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        working-directory: web
        run: npm ci
      - name: build（prebuild が data/ を public/ にコピー）
        working-directory: web
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
